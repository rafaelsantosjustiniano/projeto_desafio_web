<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 03 - Lucro Comercial</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script_questao03.js" defer></script>
</head>
<body>

    <h1>BEM-VINDO AO MEU SITE</h1>

    <div id="div-form">
        <h3>CÁLCULO DE VENDA</h3>
        <form id="formulario">
            <label for="nomeProduto">Nome do Produto</label>
            <input type="text" id="nomeProduto" required>

            <label for="valorCompra">Valor da Compra (R$)</label>
            <input type="number" id="valorCompra" required step="0.01" min="0">

            <div class="botoes-container">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
        <div id="div-dados"></div>
    </div>

</body>
</html>
