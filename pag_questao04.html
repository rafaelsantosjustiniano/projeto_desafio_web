<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 04</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script_questao04.js" defer></script>
</head>
<body>

    <h1>BEM-VINDO AO MEU SITE</h1>

    <div id="div-form">
        <h3>MÉDIA DO ALUNO</h3>
        <form id="formulario">
            <label for="nome">Nome do Aluno</label>
            <input type="text" id="nome" required>

            <label for="nota1">Nota 1</label>
            <input type="number" id="nota1" required min="0" max="10" step="0.1">

            <label for="nota2">Nota 2</label>
            <input type="number" id="nota2" required min="0" max="10" step="0.1">

            <label for="nota3">Nota 3</label>
            <input type="number" id="nota3" required min="0" max="10" step="0.1">

            <div class="botoes-container">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
        <div id="div-dados"></div>
    </div>

</body>
</html>
