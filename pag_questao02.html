<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 02</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script_questao02.js" defer></script>
</head>
<body>

    <h1>BEM-VINDO AO MEU SITE</h1>

    <div id="div-form">
        <h3>QUANTIDADE DE TINTA</h3>
        <form id="formulario">
            <label for="largura">Largura</label>
            <input type="number" id="largura" name="largura" required step="0.01">

            <label for="altura">Altura</label>
            <input type="number" id="altura" name="altura" required step="0.01">

            <div class="botoes-container">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
        <div id="div-dados"></div>
    </div>

</body>
</html>
