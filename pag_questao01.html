<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 01</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script_questao01.js" defer></script>
</head>
<body>

    <h1>BEM-VINDO AO MEU SITE</h1>

    <div id="div-form">
        <h3>MÉDIA DE TRÊS NÚMEROS</h3>
        <form id="formulario">
            <label for="n1">Primeiro Número Inteiro</label>
            <input type="number" id="n1" required step="1">

            <label for="n2">Segundo Número Inteiro</label>
            <input type="number" id="n2" required step="1">

            <label for="n3">Terceiro Número Inteiro</label>
            <input type="number" id="n3" required step="1">

            <div class="botoes-container">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
        <div id="div-dados"></div>
    </div>

</body>
</html>
